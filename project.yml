name: HTMLWall
options:
  bundleIdPrefix: com.htmlwall
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO

targets:
  HTMLWall:
    type: application
    platform: macOS
    sources:
      - path: App
        type: group
      - path: Wallpapers/patterns
        type: group
        buildPhase: resources
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.htmlwall.app
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_APP_SANDBOX: NO
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: HTMLWall
        CFBundleDisplayName: HTMLWall
        CFBundleIdentifier: com.htmlwall.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: HTMLWall
        LSMinimumSystemVersion: "12.0"
        LSUIElement: true
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
