<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a2a3a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const birds=[];for(let i=0;i<8;i++)birds.push({x:Math.random()*W,y:Math.random()*H*0.4,speed:1+Math.random()*1.5,wingPhase:Math.random()*Math.PI*2});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#f4a060');g.addColorStop(0.3,'#e08040');g.addColorStop(0.6,'#2a4a6a');g.addColorStop(1,'#1a2a4a');x.fillStyle=g;x.fillRect(0,0,W,H);
        const sunx=W*0.2,suny=H*0.25;
        const sg=x.createRadialGradient(sunx,suny,0,sunx,suny,80);sg.addColorStop(0,'#fff8e0');sg.addColorStop(0.5,'#f4d080');sg.addColorStop(1,'transparent');x.fillStyle=sg;x.beginPath();x.arc(sunx,suny,80,0,Math.PI*2);x.fill();
        x.fillStyle='#0a1520';x.beginPath();x.moveTo(0,H);x.lineTo(0,H-80);x.quadraticCurveTo(W*0.3,H-120,W*0.5,H-100);x.quadraticCurveTo(W*0.7,H-80,W,H-110);x.lineTo(W,H);x.fill();
        for(let b of birds){b.x+=b.speed;b.wingPhase+=0.2;if(b.x>W+50){b.x=-50;b.y=Math.random()*H*0.4;}const wingY=Math.sin(b.wingPhase)*15;x.strokeStyle='#000';x.lineWidth=2;x.beginPath();x.moveTo(b.x,b.y);x.quadraticCurveTo(b.x-15,b.y-wingY,b.x-25,b.y-5);x.moveTo(b.x,b.y);x.quadraticCurveTo(b.x+15,b.y-wingY,b.x+25,b.y-5);x.stroke();}
        x.globalAlpha=0.1;const lg=x.createLinearGradient(0,0,W,H);lg.addColorStop(0,'#f4a060');lg.addColorStop(1,'#1a2a4a');x.fillStyle=lg;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
