<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #0a0a1a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const cat={x:W/2,y:H/2+40,bodyColor:'#c0c0c0',accentColor:'#e0e0e0',headAngle:0,tailAngle:0,tailVel:0,blinkTimer:2000,isBlinking:false,breathPhase:0,jumpY:0,jumpVel:0,earTwitch:0,pawWave:0,rollAngle:0,cx:W/2};
    const st={pose:'idle'},ps=['idle','sit','wave','roll','walk','curl','stretch','jump'];
    const gridLines=[],nodes=[],connections=[];
    for(let i=0;i<=20;i++)gridLines.push({x:i*W/20,offset:Math.random()*Math.PI*2});
    for(let i=0;i<60;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,radius:2+Math.random()*3});
    function up(dt,t){cat.breathPhase=Math.sin(t*0.002)*0.03;cat.blinkTimer-=dt;if(cat.blinkTimer<=0){cat.isBlinking=true;cat.blinkTimer=3000+Math.random()*4000;}if(cat.isBlinking&&cat.blinkTimer<150)cat.isBlinking=false;if(Math.random()<0.002)cat.earTwitch=1;cat.earTwitch*=0.95;const tt=Math.sin(t*0.004)*0.4+(cat.cx-cat.x)*0.0003;cat.tailVel+=(tt-cat.tailAngle)*0.1;cat.tailVel*=0.85;cat.tailAngle+=cat.tailVel;cat.headAngle+=((cat.cx-cat.x)*0.0005-cat.headAngle)*0.1;if(st.pose==='wave')cat.pawWave=Math.sin(t*0.008)*0.6;else cat.pawWave*=0.92;if(st.pose==='jump'){cat.jumpVel-=0.6;cat.jumpY+=cat.jumpVel;if(cat.jumpY<=0){cat.jumpY=0;cat.jumpVel=0;st.pose='idle';}}if(st.pose==='roll'){cat.rollAngle+=0.12;if(cat.rollAngle>=Math.PI*2){cat.rollAngle=0;st.pose='idle';}}}
    function dc(t){x.save();x.translate(cat.x,cat.y+cat.jumpY);x.rotate(cat.rollAngle);x.scale(1+cat.breathPhase,1+cat.breathPhase);const s=Math.min(W,H)/600;x.fillStyle='rgba(0,0,0,0.2)';x.beginPath();x.ellipse(0,70*s,55*s,12*s,0,0,Math.PI*2);x.fill();x.strokeStyle=cat.bodyColor;x.lineWidth=12*s;x.beginPath();x.moveTo(50*s,30*s);x.quadraticCurveTo(100*s+Math.sin(t*0.004)*20*s,20*s,120*s+Math.sin(t*0.003)*30*s,-20*s+cat.tailAngle*50*s);x.stroke();x.fillStyle=cat.bodyColor;x.beginPath();x.ellipse(0,30*s,55*s,45*s,0,0,Math.PI*2);x.fill();x.fillStyle=cat.accentColor;x.globalAlpha=0.4;x.beginPath();x.ellipse(0,35*s,35*s,25*s,0,0,Math.PI);x.fill();x.globalAlpha=1;x.fillStyle=cat.bodyColor;if(st.pose==='walk'){const lo=Math.sin(t*0.015)*10;x.beginPath();x.ellipse(-30*s,65*s+lo,12*s,20*s,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(30*s,65*s-lo,12*s,20*s,0,0,Math.PI*2);x.fill();}else{x.beginPath();x.ellipse(-35*s,65*s,10*s,18*s,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(35*s,65*s,10*s,18*s,0,0,Math.PI*2);x.fill();}if(st.pose==='wave'){x.beginPath();x.ellipse(40*s,20*s+cat.pawWave*30*s,12*s,10*s,0.3,0,Math.PI*2);x.fill();}x.save();x.translate(0,-20*s);x.rotate(cat.headAngle);x.fillStyle=cat.bodyColor;x.beginPath();x.arc(0,0,40*s,0,Math.PI*2);x.fill();const et=cat.earTwitch;x.fillStyle=cat.bodyColor;x.beginPath();x.moveTo(-30*s,-25*s);x.lineTo(-25*s-et*5*s,-60*s);x.lineTo(-5*s,-30*s);x.fill();x.beginPath();x.moveTo(30*s,-25*s);x.lineTo(25*s+et*5*s,-60*s);x.lineTo(5*s,-30*s);x.fill();x.fillStyle='#ffb6c1';x.beginPath();x.moveTo(-25*s,-28*s);x.lineTo(-22*s-et*3*s,-48*s);x.lineTo(-10*s,-30*s);x.fill();x.beginPath();x.moveTo(25*s,-28*s);x.lineTo(22*s+et*3*s,-48*s);x.lineTo(10*s,-30*s);x.fill();const ey=-5*s;x.fillStyle='#333';if(!cat.isBlinking){x.beginPath();x.ellipse(-15*s,ey,8*s,10*s,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(15*s,ey,8*s,10*s,0,0,Math.PI*2);x.fill();x.fillStyle='#fff';x.beginPath();x.arc(-17*s,ey-3*s,3*s,0,Math.PI*2);x.fill();x.beginPath();x.arc(13*s,ey-3*s,3*s,0,Math.PI*2);x.fill();}else{x.lineWidth=3*s;x.beginPath();x.moveTo(-23*s,ey);x.lineTo(-7*s,ey);x.stroke();x.beginPath();x.moveTo(7*s,ey);x.lineTo(23*s,ey);x.stroke();}x.fillStyle='#ffb6c1';x.beginPath();x.moveTo(0,10*s);x.lineTo(-6*s,18*s);x.lineTo(6*s,18*s);x.fill();x.strokeStyle='#333';x.lineWidth=2*s;x.beginPath();x.moveTo(0,18*s);x.lineTo(0,25*s);x.stroke();x.beginPath();x.moveTo(0,25*s);x.quadraticCurveTo(-10*s,32*s,-15*s,25*s);x.stroke();x.beginPath();x.moveTo(0,25*s);x.quadraticCurveTo(10*s,32*s,15*s,25*s);x.stroke();x.strokeStyle='#888';x.lineWidth=1*s;for(let i=0;i<3;i++){x.beginPath();x.moveTo(-20*s,15*s+i*5*s);x.lineTo(-45*s,10*s+i*6*s);x.stroke();x.beginPath();x.moveTo(20*s,15*s+i*5*s);x.lineTo(45*s,10*s+i*6*s);x.stroke();}x.restore();x.restore();}
    function db(t){
        const g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
        g.addColorStop(0,'#1a1a3d');g.addColorStop(0.4,'#0a0a20');g.addColorStop(0.8,'#050510');g.addColorStop(1,'#000');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        x.strokeStyle='#00ffff';x.lineWidth=1;x.globalAlpha=0.15;
        for(let gl of gridLines){
            const wave=Math.sin(t*0.001+gl.offset)*50;
            x.beginPath();x.moveTo(gl.x+wave,0);
            for(let y=0;y<=H;y+=20){x.lineTo(gl.x+Math.sin(t*0.001+gl.offset+y*0.01)*30,y);}
            x.stroke();
        }
        for(let i=0;i<=15;i++){
            const y=i*H/15;x.beginPath();x.moveTo(0,y+Math.sin(t*0.0008+i)*30);
            for(let px=0;px<=W;px+=30){x.lineTo(px,y+Math.sin(t*0.001+px*0.005+i)*20);}
            x.stroke();
        }
        x.globalAlpha=1;
        for(let n of nodes){
            n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
            const pulse=0.5+Math.sin(t*0.003+n.x*0.01)*0.5;
            const ng=x.createRadialGradient(n.x,n.y,0,n.x,n.y,n.radius*3);
            ng.addColorStop(0,`hsla(${180+Math.sin(t*0.001)*40},100%,70%,${pulse})`);ng.addColorStop(1,'transparent');
            x.fillStyle=ng;x.beginPath();x.arc(n.x,n.y,n.radius*3,0,Math.PI*2);x.fill();
            x.fillStyle='#00ffff';x.beginPath();x.arc(n.x,n.y,n.radius,0,Math.PI*2);x.fill();
        }
        x.strokeStyle='#00ffff';x.lineWidth=0.5;x.globalAlpha=0.3;
        for(let i=0;i<nodes.length;i++){
            for(let j=i+1;j<nodes.length;j++){
                const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<150){x.globalAlpha=(1-dist/150)*0.3;x.beginPath();x.moveTo(nodes[i].x,nodes[i].y);x.lineTo(nodes[j].x,nodes[j].y);x.stroke();}
            }
        }
        x.globalAlpha=0.2;
        const fg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,400);
        fg.addColorStop(0,'#00ffff10');fg.addColorStop(0.5,'#ff00ff08');fg.addColorStop(1,'transparent');
        x.fillStyle=fg;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);db(ts);up(dt,ts);dc(ts);requestAnimationFrame(anim);}
    c.addEventListener('mousemove',e=>{cat.cx=e.clientX;});
    c.addEventListener('click',()=>{if(st.pose==='idle'){st.pose='jump';cat.jumpVel=15;}});
    window.addEventListener('keydown',e=>{if(e.key==='c'||e.key==='C'){st.pose=ps[(ps.indexOf(st.pose)+1)%ps.length];if(st.pose==='roll')cat.rollAngle=0;}});
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
