<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #f4e9d0; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const shells=[];for(let i=0;i<5;i++)shells.push({x:W*0.1+Math.random()*W*0.1,y:H*0.7+Math.random()*H*0.2,scale:0.5+Math.random()*0.5,rot:Math.random()*0.3-0.15});
    const flowers=[];for(let i=0;i<20;i++)flowers.push({x:Math.random()*W,y:H*0.6+Math.random()*H*0.3,s:Math.random()*15+10,phase:Math.random()*Math.PI*2,sp:Math.random()*0.02+0.01});
    const sparkles=[];for(let i=0;i<15;i++)sparkles.push({x:Math.random()*W,y:Math.random()*H*0.5,phase:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.01});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);
        g.addColorStop(0,'#f8f0e0');g.addColorStop(0.3,'#f4e9d0');g.addColorStop(0.6,'#e8d8b8');g.addColorStop(1,'#d4c4a0');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        x.fillStyle='#f4e9d0';x.fillRect(0,H*0.6,W,H*0.4);
        const wg=x.createLinearGradient(0,H*0.6,0,H);wg.addColorStop(0,'#d4e8f4');wg.addColorStop(1,'#a4c8d8');
        x.fillStyle=wg;x.fillRect(0,H*0.6,W,H*0.4);
        for(let fl of flowers){fl.phase+=fl.sp;const sway=Math.sin(fl.phase)*5;x.fillStyle=`hsla(${320+Math.random()*40},70%,${70+Math.random()*20}%,0.7)`;x.beginPath();x.arc(fl.x+sway,fl.y,fl.s,0,Math.PI*2);x.fill();x.fillStyle=`hsla(${50+Math.random()*20},80%,${70+Math.random()*20}%,0.6)`;x.beginPath();x.arc(fl.x+sway,fl.y,fl.s*0.4,0,Math.PI*2);x.fill();}
        for(let sh of shells){x.save();x.translate(sh.x,sh.y);x.rotate(sh.rot);const ss=sh.scale*Math.min(W,H)/400;x.scale(ss,ss);x.fillStyle='#f8e8d0';x.beginPath();x.moveTo(0,-60);x.bezierCurveTo(50,-40,60,40,0,60);x.bezierCurveTo(-60,40,-50,-40,0,-60);x.fill();x.fillStyle='#e8d8b8';x.beginPath();x.moveTo(0,-40);x.bezierCurveTo(30,-25,35,25,0,40);x.bezierCurveTo(-35,25,-30,-25,0,-40);x.fill();x.strokeStyle='#d4c4a0';x.lineWidth=2;for(let i=0;i<5;i++){x.beginPath();x.arc(0,0,15+i*8,Math.PI*0.1,Math.PI*0.9);x.stroke();}x.restore();}
        const cx=W/2,cy=H/2,scale=Math.min(W,H)/500;
        x.save();x.translate(cx,cy);x.scale(scale,scale);
        const waveOff=Math.sin(t*0.001)*10;
        x.fillStyle='#f8e8d0';x.beginPath();x.moveTo(-180,60);x.bezierCurveTo(-100,20+waveOff,100,20+waveOff,180,60);x.bezierCurveTo(200,80,200,120,180,140);x.bezierCurveTo(100,180,-100,180,-180,140);x.bezierCurveTo(-200,120,-200,80,-180,60);x.fill();
        x.fillStyle='#f0d8b8';x.beginPath();x.ellipse(0,30,120,150,0,0,Math.PI*2);x.fill();
        const skint=x.createLinearGradient(-100,-80,100,100);skint.addColorStop(0,'#f8e8d0');skint.addColorStop(0.5,'#e8d0b0');skint.addColorStop(1,'#d4b090');
        x.fillStyle=skint;x.beginPath();x.ellipse(0,-30,80,100,0,0,Math.PI*2);x.fill();
        x.fillStyle='#f8e8d0';x.beginPath();x.ellipse(0,-130,75,40,0,Math.PI,Math.PI*2);x.fill();
        x.fillStyle='#d4b090';x.beginPath();x.ellipse(0,-130,60,25,0,Math.PI,Math.PI*2);x.fill();
        const hairg=x.createRadialGradient(-30,-160,0,-30,-160,120);hairg.addColorStop(0,'#d4a040');hairg.addColorStop(0.5,'#b08030');hairg.addColorStop(1,'#805020');
        x.fillStyle=hairg;x.beginPath();x.moveTo(-100,-80);x.quadraticCurveTo(-120,-180,0,-200);x.quadraticCurveTo(120,-180,100,-80);x.lineTo(80,-60);x.quadraticCurveTo(60,-120,0,-140);x.quadraticCurveTo(-60,-120,-80,-60);x.fill();
        x.fillStyle='#c49464';x.beginPath();x.ellipse(-40,-50,15,18,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(40,-50,15,18,0,0,Math.PI*2);x.fill();
        x.fillStyle='#1a1010';x.beginPath();x.ellipse(-40,-52,6,8,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(40,-52,6,8,0,0,Math.PI*2);x.fill();
        x.fillStyle='#fff';x.globalAlpha=0.6;x.beginPath();x.arc(-42,-55,2,0,Math.PI*2);x.fill();x.beginPath();x.arc(38,-55,2,0,Math.PI*2);x.fill();x.globalAlpha=1;
        x.strokeStyle='#c49464';x.lineWidth=2;x.lineCap='round';x.beginPath();x.moveTo(-15,-20);x.quadraticCurveTo(0,-10,15,-20);x.stroke();
        const rolex=W*0.7,roley=H*0.8,ros=80;
        x.save();x.translate(rolex/scale,roley/scale);x.scale(1/scale,1/scale);
        const rg=x.createRadialGradient(0,0,0,0,0,ros);rg.addColorStop(0,'#fff8e0');rg.addColorStop(0.3,'#f4e8c0');rg.addColorStop(1,'#d4b080');
        x.fillStyle=rg;x.beginPath();x.arc(0,0,ros,0,Math.PI*2);x.fill();
        x.fillStyle='#f8e8d0';x.beginPath();x.arc(0,0,ros-10,0,Math.PI*2);x.fill();
        const rosec=x.createRadialGradient(0,0,0,0,0,ros-15);rosec.addColorStop(0,'#fff');rosec.addColorStop(0.2,'#f8d0d0');rosec.addColorStop(0.5,'#e8a0a0');rosec.addColorStop(1,'#c06060');
        x.fillStyle=rosec;x.beginPath();x.arc(0,0,ros-15,0,Math.PI*2);x.fill();
        for(let i=0;i<5;i++){const ra=Math.PI*2/5*i-t/2000;for(let j=0;j<3;j++){const rra=ra+j*0.3,rss=(ros-25)*(1-j*0.25);x.fillStyle=`hsla(${340+j*10},70%,${70-j*10}%,0.8)`;x.beginPath();x.arc(Math.cos(rra)*rss,Math.sin(rra)*rss,8,0,Math.PI*2);x.fill();}}x.restore();
        for(let s of sparkles){s.phase+=s.sp;x.globalAlpha=0.3+Math.sin(s.phase)*0.3;x.fillStyle='#fff';x.beginPath();x.arc(s.x/scale,s.y/scale,1.5,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        x.restore();
        x.globalAlpha=0.05;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#fff');og.addColorStop(0.5,'#f4e9d0');og.addColorStop(1,'#d4c4a0');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
