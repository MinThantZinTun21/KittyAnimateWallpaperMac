<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a1a1a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const particles=[];for(let i=0;i<80;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,size:Math.random()*2+1,color:`hsl(${Math.random()*360},70%,60%)`});
    const walls=[];for(let i=0;i<6;i++)walls.push({y:H*0.15*i,h:30+Math.random()*30,sp:0.5+Math.random()*0.5});
    function draw(t){
        x.fillStyle='#0a0a0a';x.fillRect(0,0,W,H);
        const g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.5);g.addColorStop(0,'#2a2a3a');g.addColorStop(1,'#0a0a0a');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;x.fillStyle=p.color;x.globalAlpha=0.6;x.beginPath();x.arc(p.x,p.y,p.size,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let w of walls){w.y+=w.sp;if(w.y>H)w.y=-30;x.fillStyle='rgba(100,150,200,0.1)';x.fillRect(0,w.y,W,w.h);}
        x.globalAlpha=0.1;const lg=x.createLinearGradient(0,0,W,H);lg.addColorStop(0,'#ff0000');lg.addColorStop(0.5,'#00ff00');lg.addColorStop(1,'#0000ff');x.fillStyle=lg;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
