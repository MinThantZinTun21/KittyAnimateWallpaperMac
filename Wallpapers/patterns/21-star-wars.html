<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #000; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,twinkle:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.01});
    const planets=[];for(let i=0;i<5;i++)planets.push({x:Math.random()*W,y:Math.random()*H*0.5,r:20+Math.random()*40,color:`hsl(${Math.random()*360},60%,50%)`,ring:Math.random()>0.5,sp:(Math.random()-0.5)*0.001});
    const nebula=[{x:W*0.3,y:H*0.3,r:200},{x:W*0.7,y:H*0.6,r:250},{x:W*0.5,y:H*0.2,r:180}];
    function draw(t){
        x.fillStyle='#000';x.fillRect(0,0,W,H);
        const g=x.createRadialGradient(W*0.5,H*0.3,0,W*0.5,H*0.3,Math.max(W,H));
        g.addColorStop(0,'#1a0a2e');g.addColorStop(0.5,'#0a0515');g.addColorStop(1,'#000');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let n of nebula){const ng=x.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);ng.addColorStop(0,`hsla(${270+Math.sin(t*0.001)*30},80%,30%,0.3)`);ng.addColorStop(0.5,'transparent');x.fillStyle=ng;x.fillRect(0,0,W,H);}
        for(let s of stars){s.twinkle+=s.sp;const tw=0.3+Math.sin(s.twinkle)*0.7;x.globalAlpha=tw;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let p of planets){p.x+=p.sp*10;if(p.x>W+p.r)p.x=-p.r;const pg=x.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);pg.addColorStop(0,p.color);pg.addColorStop(0.8,'#000');x.fillStyle=pg;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fill();if(p.ring){x.strokeStyle='rgba(255,255,255,0.3)';x.lineWidth=3;x.beginPath();x.ellipse(p.x,p.y,p.r*1.6,p.r*0.4,0.3,0,Math.PI*2);x.stroke();}}
        const tw=Math.sin(t*0.002),ty=H*0.7+tw*20;
        x.fillStyle='#2a4a6a';x.beginPath();x.ellipse(W*0.3,ty,120,80,0,0,Math.PI*2);x.fill();
        x.fillStyle='#3a5a7a';x.beginPath();x.ellipse(W*0.3,ty-10,100,60,0,0,Math.PI*2);x.fill();
        x.fillStyle='#4a6a8a';x.beginPath();x.ellipse(W*0.3,ty-20,80,40,0,0,Math.PI*2);x.fill();
        x.globalAlpha=0.15;const lg=x.createLinearGradient(0,0,W,H);lg.addColorStop(0,'#f00');lg.addColorStop(0.5,'#0f0');lg.addColorStop(1,'#00f');x.fillStyle=lg;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
