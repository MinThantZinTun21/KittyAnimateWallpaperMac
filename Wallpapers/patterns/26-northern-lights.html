<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #0a1520; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const curtains=[];for(let i=0;i<8;i++)curtains.push({x:Math.random()*W,y:0,h:100+Math.random()*150,w:80+Math.random()*100,phase:Math.random()*Math.PI*2,color:`hsl(${160+Math.random()*60},80%,${40+Math.random()*30}%)`});
    const stars=[];for(let i=0;i<50;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.5,s:Math.random()*2,twinkle:Math.random()*Math.PI*2});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#051525');g.addColorStop(0.5,'#0a1525');g.addColorStop(1,'#0a1020');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let s of stars){s.twinkle+=0.02;x.globalAlpha=0.3+Math.sin(s.twinkle)*0.7;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let cur of curtains){const wave=Math.sin(t*0.002+cur.phase)*20;x.globalAlpha=0.3;const cg=x.createLinearGradient(cur.x,cur.y,cur.x,cur.y+cur.h);cg.addColorStop(0,cur.color);cg.addColorStop(1,'transparent');x.fillStyle=cg;x.beginPath();x.moveTo(cur.x,cur.y);x.quadraticCurveTo(cur.x+cur.w/2+wave,cur.y+cur.h/2,cur.x+cur.w,cur.y+cur.h);x.lineTo(cur.x+cur.w,cur.y);x.fill();x.globalAlpha=1;}
        x.fillStyle='#0a1020';x.beginPath();x.moveTo(0,H);x.lineTo(0,H-50);x.quadraticCurveTo(W*0.3,H-80,W*0.5,H-60);x.quadraticCurveTo(W*0.7,H-40,W,H-70);x.lineTo(W,H);x.fill();
        x.globalAlpha=0.08;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#00ff88');og.addColorStop(0.5,'#0088ff');og.addColorStop(1,'#0a1020');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
