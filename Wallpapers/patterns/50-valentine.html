<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #2a1520; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const hearts=[];for(let i=0;i<30;i++)hearts.push({x:Math.random()*W,y:Math.random()*H,size:10+Math.random()*20,sp:0.5+Math.random()*1.5,rot:Math.random()*0.2-0.1});
    const sparkles=[];for(let i=0;i<25;i++)sparkles.push({x:Math.random()*W,y:Math.random()*H,phase:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.01});
    function draw(t){
        const g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));g.addColorStop(0,'#3a1a2a');g.addColorStop(0.5,'#2a1520');g.addColorStop(1,'#1a0a15');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let s of sparkles){s.phase+=s.sp;x.globalAlpha=0.3+Math.sin(s.phase)*0.3;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,1.5,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let h of hearts){h.y-=h.sp;if(h.y<-50){h.y=H+50;h.x=Math.random()*W;}x.save();x.translate(h.x,h.y);x.rotate(h.rot);x.fillStyle='rgba(255,80,120,0.6)';x.beginPath();x.moveTo(0,-h.size*0.3);x.bezierCurveTo(h.size*0.5,-h.size,h.size,-h.size*0.3,h.size*0.5,0);x.bezierCurveTo(h.size*0.3,h.size*0.5,0,h.size,0,h.size);x.bezierCurveTo(0,h.size,-h.size*0.3,h.size*0.5,-h.size*0.5,0);x.bezierCurveTo(-h.size,-h.size*0.3,-h.size*0.5,-h.size,0,-h.size*0.3);x.fill();x.restore();}
        x.globalAlpha=0.1;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#ff3060');og.addColorStop(1,'#1a0a15');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
