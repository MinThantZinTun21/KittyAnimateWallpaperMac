<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a1a1a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const waves=[];for(let i=0;i<4;i++)waves.push({y:H*0.3+i*H*0.15,amp:20+i*10,freq:0.008+i*0.002,sp:0.001+i*0.0005,phase:i});
    const particles=[];for(let i=0;i<40;i++)particles.push({x:Math.random()*W,y:Math.random()*H*0.6,vx:(Math.random()-0.5)*0.3,vy:Math.random()*0.2,s:Math.random()*2+1});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0a1520');g.addColorStop(0.3,'#1a2530');g.addColorStop(0.6,'#2a3540');g.addColorStop(1,'#1a2530');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let p of particles){p.x+=p.vx+Math.sin(t*0.001+p.y*0.01)*0.2;p.y+=p.vy;if(p.y>H*0.7)p.y=0;x.fillStyle='#fff';x.globalAlpha=0.4;x.beginPath();x.arc(p.x,p.y,p.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let w of waves){x.strokeStyle=`hsla(${180+w.phase*20},70%,${50+w.phase*10}%,0.5)`;x.lineWidth=3;x.beginPath();for(let wx=0;wx<=W;wx+=10){const wy=w.y+Math.sin(wx*w.freq+t*w.sp*1000+w.phase)*w.amp;wx===0?x.moveTo(wx,wy):x.lineTo(wx,wy);}x.stroke();}
        const gx=W/2,gy=H*0.6,scale=Math.min(W,H)/500;
        x.save();x.translate(gx,gy);x.scale(scale,scale);
        x.fillStyle='#1a2530';x.beginPath();x.moveTo(-180,100);x.lineTo(-180,-80);x.quadraticCurveTo(-150,-150,-80,-180);x.lineTo(80,-180);x.quadraticCurveTo(150,-150,180,-80);x.lineTo(180,100);x.fill();
        x.fillStyle='#2a3540';x.beginPath();x.moveTo(-150,100);x.lineTo(-150,-60);x.quadraticCurveTo(-120,-120,-60,-150);x.lineTo(60,-150);x.quadraticCurveTo(120,-120,150,-60);x.lineTo(150,100);x.fill();
        for(let i=0;i<3;i++){const y=-100+i*50;x.fillStyle='#f4d03f';x.globalAlpha=0.1+Math.sin(t*0.003+i)*0.1;x.beginPath();x.rect(-50,y,30,40);x.beginPath();x.rect(20,y,30,40);x.fill();}x.globalAlpha=1;
        x.restore();
        x.globalAlpha=0.1;const lg=x.createLinearGradient(0,0,W,H);lg.addColorStop(0,'#00aaff');lg.addColorStop(1,'#1a2530');x.fillStyle=lg;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
