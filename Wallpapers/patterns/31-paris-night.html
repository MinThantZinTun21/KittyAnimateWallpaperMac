<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #0a1020; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const stars=[];for(let i=0;i<50;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.4,s:Math.random()*1.5,twinkle:Math.random()*Math.PI*2});
    const twinkleLights=[];for(let i=0;i<30;i++)twinkleLights.push({x:Math.random()*W,y:Math.random()*H*0.5+50,phase:Math.random()*Math.PI*2});
    function draw(t){
        const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a0a20');g.addColorStop(0.3,'#152040');g.addColorStop(0.6,'#1a3050');g.addColorStop(1,'#0a1520');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let s of stars){s.twinkle+=0.02;x.globalAlpha=0.3+Math.sin(s.twinkle)*0.7;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        const cx=W*0.5,cy=H*0.7,scale=Math.min(W,H)/500;
        x.save();x.translate(cx,cy);x.scale(scale,scale);
        x.fillStyle='#2a2a3a';x.beginPath();x.moveTo(-200,150);x.lineTo(-180,-50);x.lineTo(-140,-200);x.lineTo(-100,-280);x.lineTo(-60,-320);x.lineTo(60,-320);x.lineTo(100,-280);x.lineTo(140,-200);x.lineTo(180,-50);x.lineTo(200,150);x.fill();
        x.strokeStyle='#3a3a4a';x.lineWidth=8;x.beginPath();x.moveTo(0,-50);x.lineTo(0,-320);x.stroke();
        for(let i=0;i<3;i++){const y=-250+i*60;x.strokeStyle='#3a3a4a';x.lineWidth=5;x.beginPath();x.moveTo(-40,y);x.lineTo(40,y);x.stroke();}
        for(let tl of twinkleLights){tl.phase+=0.03;const glow=0.3+Math.sin(tl.phase)*0.7;x.fillStyle=`rgba(255,${200+Math.random()*55},0,${glow})`;x.beginPath();x.arc(tl.x/scale-cx/scale,tl.y/scale-cy/scale,3,0,Math.PI*2);x.fill();}
        x.restore();
        x.globalAlpha=0.1;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#ffc800');og.addColorStop(1,'#0a1020');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
