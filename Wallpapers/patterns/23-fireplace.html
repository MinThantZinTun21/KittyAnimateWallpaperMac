<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #2a1a0a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const embers=[];for(let i=0;i<80;i++)embers.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*2,vy:-Math.random()*3-1,s:Math.random()*3+1});
    const sparks=[];for(let i=0;i<30;i++)sparks.push({x:Math.random()*W,y:Math.random()*H*0.5,sp:Math.random()*0.05+0.02,phase:Math.random()*Math.PI*2});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#4a2a0a');g.addColorStop(0.3,'#2a1a0a');g.addColorStop(0.7,'#1a0a00');g.addColorStop(1,'#0a0500');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let e of embers){e.x+=e.vx+Math.sin(t*0.002+e.y*0.01)*0.5;e.y+=e.vy;e.vy+=0.02;if(e.y>H){e.y=H;e.vy=-Math.random()*3-1;}if(e.x<0)e.x=W;if(e.x>W)e.x=0;x.globalAlpha=0.5+Math.random()*0.5;x.fillStyle='#f4a030';x.beginPath();x.arc(e.x,e.y,e.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let s of sparks){s.phase+=s.sp;x.globalAlpha=0.3+Math.sin(s.phase)*0.3;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,1.5,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        const gx=W*0.5,gy=H*0.6,scale=Math.min(W,H)/500;
        x.save();x.translate(gx,gy);x.scale(scale,scale);
        x.fillStyle='#1a0a00';x.beginPath();x.moveTo(-180,150);x.lineTo(-180,-50);x.quadraticCurveTo(-160,-150,-80,-180);x.lineTo(80,-180);x.quadraticCurveTo(160,-150,180,-50);x.lineTo(180,150);x.fill();
        x.fillStyle='#2a1510';x.beginPath();x.moveTo(-150,150);x.lineTo(-150,-30);x.quadraticCurveTo(-130,-120,-70,-150);x.lineTo(70,-150);x.quadraticCurveTo(130,-120,150,-30);x.lineTo(150,150);x.fill();
        for(let w=0;w<5;w++){const wy=-120+w*50;x.fillStyle='#f4a030';x.globalAlpha=0.1+Math.sin(t*0.003+w)*0.1;x.beginPath();x.rect(-60,wy,30,40);x.fill();x.beginPath();x.rect(30,wy,30,40);x.fill();}x.globalAlpha=1;
        x.restore();
        x.globalAlpha=0.1;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#f4a030');og.addColorStop(1,'#1a0a00');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
