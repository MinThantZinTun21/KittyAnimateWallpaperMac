<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a2a1a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const petals=[];for(let i=0;i<30;i++)petals.push({x:Math.random()*W,y:Math.random()*H*0.7,vx:(Math.random()-0.5)*1,vy:Math.random()*0.5+0.3,rot:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.02,size:8+Math.random()*8});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1a2a1a');g.addColorStop(0.5,'#2a3a2a');g.addColorStop(1,'#1a2a1a');x.fillStyle=g;x.fillRect(0,0,W,H);
        x.fillStyle='#1a2a1a';x.fillRect(0,H*0.7,W,H*0.3);
        const wg=x.createLinearGradient(0,H*0.7,0,H);wg.addColorStop(0,'#1a2a1a');wg.addColorStop(1,'#0a150a');x.fillStyle=wg;x.fillRect(0,H*0.7,W,H*0.3);
        for(let p of petals){p.x+=p.vx+Math.sin(t*0.001+p.y*0.01)*0.3;p.y+=p.vy;p.rot+=p.sp;if(p.y>H){p.y=0;p.x=Math.random()*W;}x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.fillStyle='rgba(255,150,180,0.7)';x.beginPath();x.ellipse(0,0,p.size,p.size*0.5,0,0,Math.PI*2);x.fill();x.restore();}
        x.globalAlpha=0.1;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#ffb0c0');og.addColorStop(1,'#1a2a1a');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
