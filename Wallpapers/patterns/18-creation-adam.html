<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #2a2520; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const clouds=[];for(let i=0;i<6;i++)clouds.push({x:Math.random()*W,y:50+Math.random()*80,r:80+Math.random()*100,sp:(Math.random()-0.5)*0.3});
    const sparkles=[];for(let i=0;i<20;i++)sparkles.push({x:Math.random()*W,y:Math.random()*H*0.4,phase:Math.random()*Math.PI*2,sp:Math.random()*0.03+0.01});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);
        g.addColorStop(0,'#4a3a30');g.addColorStop(0.3,'#3a2a20');g.addColorStop(0.7,'#2a2015');g.addColorStop(1,'#1a1510');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let cl of clouds){cl.x+=cl.sp;if(cl.x<-cl.r)cl.x=W+cl.r;if(cl.x>W+cl.r)cl.x=-cl.r;const cg=x.createRadialGradient(cl.x,cl.y,0,cl.x,cl.y,cl.r);cg.addColorStop(0,'#6a5a50');cg.addColorStop(0.5,'#4a3a30');cg.addColorStop(1,'transparent');x.globalAlpha=0.3;x.fillStyle=cg;x.beginPath();x.arc(cl.x,cl.y,cl.r,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        const cy=H*0.5,scale=Math.min(W,H)/500;
        x.save();x.translate(W/2,cy);x.scale(scale,scale);
        x.fillStyle='#c49464';x.beginPath();x.moveTo(-250,200);x.lineTo(-250,-50);x.quadraticCurveTo(-230,-150,-150,-180);x.lineTo(150,-180);x.quadraticCurveTo(230,-150,250,-50);x.lineTo(250,200);x.fill();
        x.fillStyle='#a07040';x.beginPath();x.moveTo(-250,200);x.lineTo(-250,50);x.quadraticCurveTo(-200,-30,-100,-60);x.lineTo(100,-60);x.quadraticCurveTo(200,-30,250,50);x.lineTo(250,200);x.fill();
        const godx=0,gody=-100;
        const godPulse=Math.sin(t*0.002)*0.05;
        x.fillStyle='#e8d8c0';x.beginPath();x.ellipse(godx,gody,80*godPulse+80,90*godPulse+90,0,0,Math.PI*2);x.fill();
        x.fillStyle='#d4c0a0';x.beginPath();x.ellipse(godx,gody-80,60,40,0,Math.PI,Math.PI*2);x.fill();
        const hairlines=[];for(let i=0;i<8;i++)hl={x:godx-50+i*14,y:gody-90,r:15+i*3};
        x.fillStyle='#d4c0a0';for(let i=0;i<8;i++){x.beginPath();x.arc(godx-50+i*14,gody-90,15+i*3,Math.PI,Math.PI*2);x.fill();}
        const beardg=x.createRadialGradient(godx,gody+40,0,godx,gody+40,80);beardg.addColorStop(0,'#d4c0a0');beardg.addColorStop(1,'#a08060');
        x.fillStyle=beardg;x.beginPath();x.moveTo(godx-40,gody+20);x.quadraticCurveTo(godx-50,gody+80,godx,gody+100);x.quadraticCurveTo(godx+50,gody+80,godx+40,gody+20);x.fill();
        x.fillStyle='#d4c0a0';x.beginPath();x.ellipse(godx-45,gody-40,20,25,0.2,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(godx+45,gody-40,20,25,-0.2,0,Math.PI*2);x.fill();
        const blink=Math.sin(t*0.003)>0.95;
        if(blink){x.strokeStyle='#1a1010';x.lineWidth=2;x.beginPath();x.moveTo(godx-55,gody-42);x.quadraticCurveTo(godx-45,gody-48,godx-35,gody-42);x.stroke();x.beginPath();x.moveTo(godx+35,gody-42);x.quadraticCurveTo(godx+45,gody-48,godx+55,gody-42);x.stroke();}else{x.fillStyle='#1a1010';x.beginPath();x.ellipse(godx-45,gody-40,6,8,0.2,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(godx+45,gody-40,6,8,-0.2,0,Math.PI*2);x.fill();x.fillStyle='#fff';x.globalAlpha=0.6;x.beginPath();x.arc(godx-47,gody-43,2,0,Math.PI*2);x.fill();x.beginPath();x.arc(godx+43,gody-43,2,0,Math.PI*2);x.fill();x.globalAlpha=1;}
        x.strokeStyle='#a08060';x.lineWidth=2;x.beginPath();x.moveTo(godx-10,gody+30);x.quadraticCurveTo(godx,gody+40,godx+10,gody+30);x.stroke();
        const armAngle=Math.sin(t*0.002)*0.1-0.3;
        x.save();x.translate(godx+80,gody+20);x.rotate(armAngle);x.fillStyle='#e8d8c0';x.fillRect(0,-15,120,30);x.fillStyle='#d4c0a0';x.beginPath();x.ellipse(130,0,20,12,0,0,Math.PI*2);x.fill();x.restore();
        const adamx=0,adamy=120;
        const adamBend=Math.sin(t*0.002)*5;
        x.fillStyle='#d4a574';x.beginPath();x.ellipse(adamx,adamy+adamBend,70,85,0,0,Math.PI*2);x.fill();
        x.fillStyle='#c49464';x.beginPath();x.ellipse(adamx,adamy+50+adamBend,50,60,0,0,Math.PI*2);x.fill();
        x.fillStyle='#d4a574';x.beginPath();x.ellipse(adamx,adamy-80+adamBend,45,50,0,0,Math.PI*2);x.fill();
        x.fillStyle='#2a2015';x.beginPath();x.moveTo(adamx-60,adamy-120+adamBend);x.quadraticCurveTo(adamx-70,adamy-160,adamx-30,adamy-180);x.lineTo(adamx+30,adamy-180);x.quadraticCurveTo(adamx+70,adamy-160,adamx+60,adamy-120+adamBend);x.fill();
        x.fillStyle='#c49464';x.beginPath();x.ellipse(adamx-35,adamy-95+adamBend,15,18,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(adamx+35,adamy-95+adamBend,15,18,0,0,Math.PI*2);x.fill();
        const adamBlink=Math.sin(t*0.003+1)>0.95;
        if(adamBlink){x.strokeStyle='#1a1010';x.lineWidth=2;x.beginPath();x.moveTo(adamx-45,adamy-97+adamBend);x.quadraticCurveTo(adamx-35,adamy-103+adamBend,adamx-25,adamy-97+adamBend);x.stroke();x.beginPath();x.moveTo(adamx+25,adamy-97+adamBend);x.quadraticCurveTo(adamx+35,adamy-103+adamBend,adamx+45,adamy-97+adamBend);x.stroke();}else{x.fillStyle='#1a1010';x.beginPath();x.ellipse(adamx-35,adamy-95+adamBend,5,7,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(adamx+35,adamy-95+adamBend,5,7,0,0,Math.PI*2);x.fill();x.fillStyle='#fff';x.globalAlpha=0.5;x.beginPath();x.arc(adamx-37,adamy-98+adamBend,2,0,Math.PI*2);x.fill();x.beginPath();x.arc(adamx+33,adamy-98+adamBend,2,0,Math.PI*2);x.fill();x.globalAlpha=1;}
        x.strokeStyle='#8a6040';x.lineWidth=2;x.beginPath();x.moveTo(adamx-15,adamy-70+adamBend);x.quadraticCurveTo(adamx,adamy-60+adamBend,adamx+15,adamy-70+adamBend);x.stroke();
        const fingerAngle=Math.sin(t*0.002)*0.15;
        x.save();x.translate(adamx-65,adamy-20+adamBend);x.rotate(fingerAngle);x.fillStyle='#d4a574';x.fillRect(0,-8,60,16);x.fillStyle='#c49464';x.beginPath();x.ellipse(65,0,12,8,0,0,Math.PI*2);x.fill();x.restore();
        for(let s of sparkles){s.phase+=s.sp;x.globalAlpha=0.2+Math.sin(s.phase)*0.3;x.fillStyle='#fff';x.beginPath();x.arc(s.x/scale-W/2/scale,s.y/scale-cy/scale,1,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        x.restore();
        x.globalAlpha=0.08;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#e8d8c0');og.addColorStop(0.5,'#2a2520');og.addColorStop(1,'#1a1510');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
