<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a3a5a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const waves=[];for(let i=0;i<5;i++)waves.push({y:H*0.4+i*H*0.12,amp:40+i*20,freq:0.006+i*0.002,sp:0.001+i*0.0005,phase:i,color:`hsla(${200+i*10},${60+i*5}%,${40+i*5}%,0.7-${i*0.1})`});
    const foamParticles=[];for(let i=0;i<30;i++)foamParticles.push({x:Math.random()*W,y:Math.random()*H*0.7+100,vx:(Math.random()-0.5)*0.5,vy:Math.random()*0.3+0.1,s:Math.random()*3+1,a:Math.random()*0.5+0.2});
    const mtFuji={x:W*0.8,y:H*0.35,h:120,w:80};
    function draw(t){
        const g=x.createLinearGradient(0,0,0,H);
        g.addColorStop(0,'#f4e8d0');g.addColorStop(0.3,'#e8d8b8');g.addColorStop(0.5,'#a8c8d8');g.addColorStop(0.7,'#4a8ab8');g.addColorStop(1,'#2a5a80');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        x.fillStyle='#f4e8d0';x.beginPath();x.ellipse(mtFuji.x,mtFuji.y,mtFuji.w,mtFuji.h,0,0,Math.PI*2);x.fill();
        const snowg=x.createRadialGradient(mtFuji.x,mtFuji.y-mtFuji.h*0.3,0,mtFuji.x,mtFuji.y,mtFuji.w);snowg.addColorStop(0,'#fff');snowg.addColorStop(0.5,'#f8f0e0');snowg.addColorStop(1,'#d4c4a0');
        x.fillStyle=snowg;x.beginPath();x.ellipse(mtFuji.x,mtFuji.y,mtFuji.w*0.8,mtFuji.h*0.8,0,0,Math.PI*2);x.fill();
        x.fillStyle='#d4c4a0';x.beginPath();x.ellipse(mtFuji.x,mtFuji.y,mtFuji.w*0.5,mtFuji.h*0.3,0,0,Math.PI*2);x.fill();
        for(let w of waves){x.strokeStyle=w.color;x.lineWidth=4+w.phase*2;x.beginPath();for(let wx=0;wx<=W;wx+=15){const wy=w.y+Math.sin(wx*w.freq+t*w.sp*1000+w.phase)*w.amp*Math.sin(t*0.001);wx===0?x.moveTo(wx,wy):x.lineTo(wx,wy);}x.stroke();}
        for(let fp of foamParticles){fp.x+=fp.vx+Math.sin(t*0.001+fp.y*0.01)*0.3;fp.y+=fp.vy;if(fp.y>H)fp.y=0;if(fp.x<0)fp.x=W;if(fp.x>W)fp.x=0;x.globalAlpha=fp.a;x.fillStyle='#fff';x.beginPath();x.arc(fp.x,fp.y,fp.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        const cx=W/2,cy=H*0.6,scale=Math.min(W,H)/500;
        x.save();x.translate(cx,cy);x.scale(scale,scale);
        const clawWave=t*0.003;
        x.fillStyle='#2a4a6a';x.beginPath();x.moveTo(-250,80);x.quadraticCurveTo(-200,-150,-100,-180);x.quadraticCurveTo(-50,-200,0,-150);x.quadraticCurveTo(50,-200,100,-180);x.quadraticCurveTo(200,-150,250,80);x.closePath();x.fill();
        x.fillStyle='#3a5a7a';x.beginPath();x.moveTo(-220,60);x.quadraticCurveTo(-180,-120,-90,-150);x.quadraticCurveTo(-40,-170,0,-120);x.quadraticCurveTo(40,-170,90,-150);x.quadraticCurveTo(180,-120,220,60);x.closePath();x.fill();
        x.fillStyle='#4a6a8a';x.beginPath();x.moveTo(-180,40);x.quadraticCurveTo(-150,-80,-70,-100);x.quadraticCurveTo(-30,-120,0,-80);x.quadraticCurveTo(30,-120,70,-100);x.quadraticCurveTo(150,-80,180,40);x.closePath();x.fill();
        x.fillStyle='#f8f0e0';x.beginPath();x.moveTo(-80,20);x.quadraticCurveTo(-60,-50,-30,-70);x.quadraticCurveTo(0,-90,30,-70);x.quadraticCurveTo(60,-50,80,20);x.closePath();x.fill();
        const claws=[{x:-60,y:-60,angle:0.5},{x:-30,y:-80,angle:0.3},{x:30,y:-80,angle:-0.3},{x:60,y:-60,angle:-0.5}];
        for(let claw of claws){x.save();x.translate(claw.x,claw.y);x.rotate(claw.angle+Math.sin(clawWave)*0.1);x.fillStyle='#f8f0e0';x.beginPath();x.moveTo(0,-40);x.quadraticCurveTo(15,-30,10,0);x.lineTo(0,10);x.lineTo(-10,0);x.quadraticCurveTo(-15,-30,0,-40);x.fill();x.strokeStyle='#d4c4a0';x.lineWidth=2;x.beginPath();x.moveTo(-5,-30);x.lineTo(-3,0);x.moveTo(0,-35);x.lineTo(0,5);x.moveTo(5,-30);x.lineTo(3,0);x.stroke();x.restore();}
        x.fillStyle='#f8f0e0';x.beginPath();x.ellipse(0,30,50,30,0,0,Math.PI*2);x.fill();
        x.fillStyle='#e8d8c0';x.beginPath();x.ellipse(0,40,40,20,0,0,Math.PI*2);x.fill();
        x.fillStyle='#1a3a4a';x.beginPath();x.moveTo(-40,-20);x.quadraticCurveTo(-50,-50,-30,-70);x.lineTo(30,-70);x.quadraticCurveTo(50,-50,40,-20);x.fill();
        const eyes=[{x:-15,y:-30},{x:15,y:-30}];
        for(let eye of eyes){x.fillStyle='#1a1010';x.beginPath();x.ellipse(eye.x,eye.y,6,8,0,0,Math.PI*2);x.fill();x.fillStyle='#fff';x.beginPath();x.arc(eye.x-2,eye.y-2,2,0,Math.PI*2);x.fill();}
        x.restore();
        x.globalAlpha=0.08;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#f4e8d0');og.addColorStop(0.5,'#4a8ab8');og.addColorStop(1,'#2a5a80');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
