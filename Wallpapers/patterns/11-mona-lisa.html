<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a1008; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const particles=[];for(let i=0;i<120;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,s:Math.random()*2+1,c:`hsl(${35+Math.random()*20},${60+Math.random()*20}%,${40+Math.random()*30}%)`,a:Math.random()*0.6+0.2});
    const sparkles=[];for(let i=0;i<30;i++)sparkles.push({x:Math.random()*W,y:Math.random()*H,phase:Math.random()*Math.PI*2,sp:Math.random()*0.02+0.01});
    let smileAngle=0,eyeOpen=1,breath=0;
    function draw(t){
        x.fillStyle='#2a1810';x.fillRect(0,0,W,H);
        const g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.8);
        g.addColorStop(0,'#4a3020');g.addColorStop(0.3,'#2a1810');g.addColorStop(0.7,'#1a0d05');g.addColorStop(1,'#0a0500');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let p of particles){p.x+=p.vx+Math.sin(t*0.001+p.y*0.01)*0.2;p.y+=p.vy+Math.cos(t*0.001+p.x*0.01)*0.2;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;x.globalAlpha=p.a*(0.5+Math.sin(t*0.002)*0.3);x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,p.s,0,Math.PI*2);x.fill();}
        x.globalAlpha=1;
        const cx=W/2,cy=H/2,scale=Math.min(W,H)/500;
        x.save();x.translate(cx,cy);x.scale(scale,scale);
        x.fillStyle='#3d2817';x.beginPath();x.ellipse(0,60,180,220,0,0,Math.PI*2);x.fill();
        x.fillStyle='#4a3020';x.beginPath();x.ellipse(0,50,170,200,0,0,Math.PI*2);x.fill();
        const bg=x.createRadialGradient(0,-30,0,0,0,250);
        bg.addColorStop(0,'#5a4030');bg.addColorStop(1,'#2a1810');
        x.fillStyle=bg;x.fillRect(-200,-250,400,500);
        breath=Math.sin(t*0.002)*3;
        x.fillStyle='#d4a574';x.beginPath();x.ellipse(0,0+breath,95,120,0,0,Math.PI*2);x.fill();
        x.fillStyle='#c49464';x.beginPath();x.ellipse(0,20+breath,75,90,0,0,Math.PI*2);x.fill();
        const neckg=x.createLinearGradient(-40,100,-40,180);neckg.addColorStop(0,'#c49464');neckg.addColorStop(1,'#8a6040');
        x.fillStyle=neckg;x.beginPath();x.moveTo(-40,110);x.quadraticCurveTo(-50,150,-35,190);x.lineTo(35,190);x.quadraticCurveTo(50,150,40,110);x.fill();
        const dr=x.createRadialGradient(-30,-20,0,-30,-20,120);dr.addColorStop(0,'rgba(255,220,180,0.3)');dr.addColorStop(1,'transparent');
        x.fillStyle=dr;x.beginPath();x.ellipse(0,0+breath,95,120,0,0,Math.PI*2);x.fill();
        x.fillStyle='#5a4030';x.beginPath();x.moveTo(-120,-80);x.quadraticCurveTo(-140,-150,-100,-220);x.lineTo(100,-220);x.quadraticCurveTo(140,-150,120,-80);x.closePath();x.fill();
        x.fillStyle='#6a5040';x.beginPath();x.moveTo(-110,-90);x.quadraticCurveTo(-130,-160,-90,-210);x.lineTo(90,-210);x.quadraticCurveTo(130,-160,110,-90);x.closePath();x.fill();
        x.fillStyle='#d4a574';x.beginPath();x.ellipse(0,-180,100,40,0,Math.PI,Math.PI*2);x.fill();
        x.fillStyle='#c49464';x.beginPath();x.ellipse(0,-180,90,30,0,Math.PI,Math.PI*2);x.fill();
        x.fillStyle='#3d2817';x.beginPath();x.ellipse(-55,-60+breath,35,45,0.2,-0.3,Math.PI*2);x.fill();
        x.beginPath();x.ellipse(55,-60+breath,35,45,-0.2,-0.3,Math.PI*2);x.fill();
        x.fillStyle='#e4b584';x.beginPath();x.ellipse(-55,-55+breath,28,38,0.2,0,Math.PI*2);x.fill();
        x.beginPath();x.ellipse(55,-55+breath,28,38,-0.2,0,Math.PI*2);x.fill();
        const sh=x.createRadialGradient(-55,-70+breath,0,-55,-70+breath,30);sh.addColorStop(0,'rgba(255,255,255,0.4)');sh.addColorStop(0.5,'rgba(255,255,255,0.1)');sh.addColorStop(1,'transparent');
        x.fillStyle=sh;x.beginPath();x.ellipse(-55,-70+breath,28,38,0.2,0,Math.PI*2);x.fill();
        x.fillStyle=sh;x.beginPath();x.ellipse(55,-70+breath,28,38,-0.2,0,Math.PI*2);x.fill();
        eyeOpen=0.7+Math.sin(t*0.003)*0.3;
        x.fillStyle='#4a3020';x.beginPath();x.ellipse(-55,-55+breath,10*eyeOpen,12*eyeOpen,0.1,0,Math.PI*2);x.fill();
        x.beginPath();x.ellipse(55,-55+breath,10*eyeOpen,12*eyeOpen,-0.1,0,Math.PI*2);x.fill();
        x.fillStyle='#2a1810';x.beginPath();x.ellipse(-55,-55+breath,5*eyeOpen,7*eyeOpen,0.1,0,Math.PI*2);x.fill();
        x.beginPath();x.ellipse(55,-55+breath,5*eyeOpen,7*eyeOpen,-0.1,0,Math.PI*2);x.fill();
        x.fillStyle='#fff';x.globalAlpha=0.8;x.beginPath();x.arc(-57,-58+breath,2,0,Math.PI*2);x.fill();x.globalAlpha=1;
        smileAngle=Math.sin(t*0.001)*0.05+0.05;
        x.strokeStyle='#8a6040';x.lineWidth=3;x.lineCap='round';
        x.beginPath();x.moveTo(-25,30+breath);x.quadraticCurveTo(0,45+breath+smileAngle*50,25,30+breath);x.stroke();
        x.strokeStyle='#6a5040';x.lineWidth=2;
        x.beginPath();x.moveTo(-20,38+breath);x.quadraticCurveTo(0,48+breath,20,38+breath);x.stroke();
        x.fillStyle='rgba(139,90,43,0.3)';x.beginPath();x.moveTo(-20,20+breath);x.quadraticCurveTo(0,25+breath,20,20+breath);x.lineTo(15,35+breath);x.quadraticCurveTo(0,40+breath,-15,35+breath);x.fill();
        for(let s of sparkles){s.phase+=s.sp;x.globalAlpha=0.3+Math.sin(s.phase)*0.3;x.fillStyle='#fff8e0';x.beginPath();x.arc(s.x/scale,s.y/scale,1.5,0,Math.PI*2);x.fill();}
        x.globalAlpha=1;
        x.restore();
        x.globalAlpha=0.1;const vg=x.createLinearGradient(0,0,W,H);vg.addColorStop(0,'#1a0d05');vg.addColorStop(0.5,'#2a1810');vg.addColorStop(1,'#1a0d05');x.fillStyle=vg;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
