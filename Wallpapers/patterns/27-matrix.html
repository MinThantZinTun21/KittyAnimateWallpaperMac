<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #0a0a0a; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const particles=[];for(let i=0;i<150;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,size:Math.random()*3+1,color:`hsl(${Math.random()*60},80%,60%)`});
    const grids=[];for(let i=0;i<30;i++)grids.push({x1:Math.random()*W,y1:Math.random()*H,x2:Math.random()*W,y2:Math.random()*H,sp:Math.random()*0.02+0.01});
    function draw(t){
        x.fillStyle='#000';x.fillRect(0,0,W,H);
        const cx=W/2,cy=H/2;
        for(let g of grids){g.x1+=Math.cos(t*g.sp)*2;g.y1+=Math.sin(t*g.sp)*2;if(g.x1>W)g.x1=0;if(g.y1>H)g.y1=0;x.strokeStyle='rgba(0,255,150,0.1)';x.lineWidth=1;x.beginPath();x.moveTo(g.x1,g.y1);x.lineTo(g.x1+100,g.y1);x.moveTo(g.x1,g.y1);x.lineTo(g.x1,g.y1+100);x.stroke();}
        for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;x.fillStyle=p.color;x.globalAlpha=0.7;x.beginPath();x.arc(p.x,p.y,p.size,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        const perspective=0.001;x.strokeStyle='rgba(0,255,150,0.3)';x.lineWidth=1;for(let i=0;i<20;i++){const y=i*40-H*0.3;x.beginPath();x.moveTo(0,H-y*perspective*500+cy);x.lineTo(W,H-y*perspective*500+cy);x.stroke();}for(let i=0;i<30;i++){const x1=i*50;x.beginPath();x.moveTo(x1,0);x.lineTo(x1+(H-cy)*perspective*500,cy*2);x.stroke();}
        x.globalAlpha=0.1;const og=x.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H));og.addColorStop(0,'#00ff96');og.addColorStop(1,'#000');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
