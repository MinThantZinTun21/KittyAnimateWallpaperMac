<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a2030; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const clocks=[];for(let i=0;i<8;i++)clocks.push({x:Math.random()*W,y:Math.random()*H,r:30+Math.random()*50,rot:Math.random()*Math.PI*2,sp:(Math.random()-0.5)*0.002,droop:Math.random()*0.3+0.1});
    const ants=[];for(let i=0;i<20;i++)ants.push({x:Math.random()*W,y:Math.random()*H,angle:Math.random()*Math.PI*2,sp:Math.random()*2+1});
    const meltDrops=[];for(let i=0;i<15;i++)meltDrops.push({x:Math.random()*W,y:Math.random()*H*0.5+50,r:5+Math.random()*15,sp:Math.random()*0.5+0.2});
    function draw(t){
        const g=x.createLinearGradient(0,0,W,H);
        g.addColorStop(0,'#2a3550');g.addColorStop(0.4,'#1a2535');g.addColorStop(0.7,'#152030');g.addColorStop(1,'#0a1520');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let md of meltDrops){md.y+=md.sp;if(md.y>H)md.y=0;x.globalAlpha=0.3+Math.sin(t*0.002+md.x)*0.2;x.fillStyle='#d4a040';x.beginPath();x.ellipse(md.x,md.y,md.r*0.7,md.r,0,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        x.fillStyle='#c49430';x.beginPath();x.moveTo(0,H);x.lineTo(0,H-100);x.quadraticCurveTo(W*0.2,H-150,W*0.4,H-120);x.quadraticCurveTo(W*0.6,H-90,W*0.7,H-130);x.quadraticCurveTo(W*0.85,H-170,W,H-110);x.lineTo(W,H);x.fill();
        x.fillStyle='#2a3540';x.beginPath();x.moveTo(0,H-60);x.lineTo(0,H);x.lineTo(W,H);x.lineTo(W,H-60);x.quadraticCurveTo(W*0.7,H-80,W*0.5,H-60);x.quadraticCurveTo(W*0.3,H-40,W*0.15,H-60);x.fill();
        const cx=W/2,cy=H/2+50,scale=Math.min(W,H)/500;
        x.save();x.translate(cx,cy);x.scale(scale,scale);
        const platform=x.createLinearGradient(-200,100,200,100);platform.addColorStop(0,'#4a4a5a');platform.addColorStop(0.5,'#3a3a4a');platform.addColorStop(1,'#2a2a3a');
        x.fillStyle=platform;x.beginPath();x.moveTo(-200,80);x.quadraticCurveTo(0,60,200,80);x.lineTo(200,120);x.quadraticCurveTo(0,100,-200,120);x.fill();
        const meltFactor=Math.sin(t*0.001)*0.15;
        function drawMeltingClock(x,y,r,rot,droop,t){const mf=Math.sin(t*0.001)*0.2;x.fillStyle='#e8d8a0';x.beginPath();x.ellipse(x,y+r*droop*0.3,r*(1+mf),r*(1-mf*0.5),rot,0,Math.PI*2);x.fill();x.fillStyle='#d4c080';x.beginPath();x.ellipse(x,y+r*droop*0.3,r*(0.8+mf),r*(0.4-mf*0.3),rot,0,Math.PI*2);x.fill();x.strokeStyle='#8b7355';x.lineWidth=3;x.beginPath();x.arc(x,y+r*droop*0.3,r*0.7,0,Math.PI*2);x.stroke();for(let h=0;h<12;h++){const angle=h*Math.PI/6+rot;x.strokeStyle='#8b7355';x.lineWidth=2;x.beginPath();x.moveTo(x+Math.cos(angle)*r*0.5,y+Math.sin(angle)*r*0.5+r*droop*0.3);x.lineTo(x+Math.cos(angle)*r*0.6,y+Math.sin(angle)*r*0.6+r*droop*0.3);x.stroke();}const ha=t*0.001;x.strokeStyle='#4a3020';x.lineWidth=3;x.beginPath();x.moveTo(x,y+r*droop*0.3);x.lineTo(x+Math.cos(ha)*r*0.4,y+Math.sin(ha)*r*0.4+r*droop*0.3);x.stroke();x.beginPath();x.moveTo(x,y+r*droop*0.3);x.lineTo(x+Math.cos(ha*2.5)*r*0.25,y+Math.sin(ha*2.5)*r*0.25+r*droop*0.3);x.stroke();}
        for(let cl of clocks){cl.rot+=cl.sp;drawMeltingClock(cl.x/scale-cx/scale,cl.y/scale-cy/scale,cl.r,cl.rot,cl.droop,t);}
        x.fillStyle='#e8d8a0';x.beginPath();x.ellipse(-80,0,50,30,0.2,0,Math.PI*2);x.fill();
        x.fillStyle='#d4c080';x.beginPath();x.ellipse(-80,5,40,20,0.2,0,Math.PI*2);x.fill();
        const legs=[{x:-120,y:60,angle:0.3},{x:-80,y:60,angle:-0.2},{x:80,y:60,angle:-0.3},{x:120,y:60,angle:0.2}];
        for(let l of legs){x.save();x.translate(l.x,l.y);x.rotate(l.angle);x.fillStyle='#e8d8a0';x.fillRect(-8,-60,16,60);x.restore();}
        x.fillStyle='#c49430';x.beginPath();x.moveTo(-10,-90);x.quadraticCurveTo(0,-100,10,-90);x.lineTo(8,0);x.lineTo(-8,0);x.fill();
        for(let ant of ants){ant.x+=Math.cos(ant.angle)*ant.sp;ant.y+=Math.sin(ant.angle)*ant.sp;if(ant.x<0)ant.x=W;if(ant.x>W)ant.x=0;if(ant.y<0)ant.y=H;if(ant.y>H)ant.y=0;x.save();x.translate(ant.x/scale-cx/scale,ant.y/scale-cy/scale);x.rotate(ant.angle);x.fillStyle='#1a1010';x.beginPath();x.ellipse(0,0,6,3,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(-8,0,3,2,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(-12,0,2,1.5,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(-16,0,1.5,1,0,0,Math.PI*2);x.fill();x.restore();}
        x.restore();
        x.globalAlpha=0.08;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#e8d8a0');og.addColorStop(0.5,'#1a2535');og.addColorStop(1,'#0a1520');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
