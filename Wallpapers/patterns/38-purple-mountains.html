<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #2a1a2e; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.6,s:Math.random()*2,twinkle:Math.random()*Math.PI*2});
    const nebula=[];for(let i=0;i<5;i++)nebula.push({x:Math.random()*W,y:Math.random()*H*0.5,r:150+Math.random()*150,color:`hsl(${280+Math.random()*60},60%,${20+Math.random()*20}%)`});
    function draw(t){
        const g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));g.addColorStop(0,'#2a1a3e');g.addColorStop(0.5,'#1a0a2e');g.addColorStop(1,'#0a0515');x.fillStyle=g;x.fillRect(0,0,W,H);
        for(let n of nebula){const ng=x.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);ng.addColorStop(0,n.color);ng.addColorStop(1,'transparent');x.globalAlpha=0.2;x.fillStyle=ng;x.fillRect(0,0,W,H);}x.globalAlpha=1;
        for(let s of stars){s.twinkle+=0.02;x.globalAlpha=0.3+Math.sin(s.twinkle)*0.7;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        x.fillStyle='#1a0a2e';x.beginPath();x.moveTo(0,H);x.lineTo(0,H-150);x.quadraticCurveTo(W*0.2,H-250,W*0.4,H-200);x.quadraticCurveTo(W*0.6,H-150,W*0.8,H-220);x.quadraticCurveTo(W*0.9,H-280,W,H-180);x.lineTo(W,H);x.fill();
        x.globalAlpha=0.15;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#ff00ff');og.addColorStop(1,'#2a1a2e');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
