<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #0a0a15; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const stars=[];for(let i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.5,s:Math.random()*1.5,twinkle:Math.random()*Math.PI*2});
    const meteors=[];for(let i=0;i<5;i++)meteors.push({x:Math.random()*W,y:Math.random()*H*0.5,vx:3+Math.random()*2,vy:2+Math.random()*2,active:false});
    function draw(t){
        x.fillStyle='#050510';x.fillRect(0,0,W,H);
        for(let s of stars){s.twinkle+=0.02;x.globalAlpha=0.3+Math.sin(s.twinkle)*0.7;x.fillStyle='#fff';x.beginPath();x.arc(s.x,s.y,s.s,0,Math.PI*2);x.fill();}x.globalAlpha=1;
        for(let m of meteors){if(Math.random()>0.99){m.active=true;m.x=Math.random()*W;m.y=Math.random()*H*0.3;}if(m.active){m.x+=m.vx;m.y+=m.vy;x.strokeStyle='rgba(255,200,100,0.8)';x.lineWidth=2;x.beginPath();x.moveTo(m.x,m.y);x.lineTo(m.x-m.vx*10,m.y-m.vy*10);x.stroke();if(m.y>H)m.active=false;}}
        x.globalAlpha=0.1;const og=x.createLinearGradient(0,0,W,H);og.addColorStop(0,'#ffc800');og.addColorStop(1,'#050510');x.fillStyle=og;x.fillRect(0,0,W,H);x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);draw(ts);requestAnimationFrame(anim);}
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
