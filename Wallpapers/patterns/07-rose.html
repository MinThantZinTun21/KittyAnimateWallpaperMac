<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body { background: #1a0a15; width: 100vw; height: 100vh; overflow: hidden; margin: 0; } canvas { display: block; }</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(function() {
    const c=document.getElementById('canvas'),x=c.getContext('2d');let W=window.innerWidth,H=window.innerHeight,d=window.devicePixelRatio||1,lt=0;
    function rs(){W=window.innerWidth;H=window.innerHeight;c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';x.scale(d,d);}rs();
    const cat={x:W/2,y:H/2+40,bodyColor:'#ffb6c1',accentColor:'#ff69b4',headAngle:0,tailAngle:0,tailVel:0,blinkTimer:2000,isBlinking:false,breathPhase:0,jumpY:0,jumpVel:0,earTwitch:0,pawWave:0,rollAngle:0,cx:W/2};
    const st={pose:'idle'},ps=['idle','sit','wave','roll','walk','curl','stretch','jump'];
    const petals=[],particles=[],glows=[];
    for(let i=0;i<40;i++)petals.push({x:Math.random()*W,y:Math.random()*H,rot:Math.random()*Math.PI*2,vy:0.3+Math.random()*0.7,vx:(Math.random()-0.5)*0.8,vr:(Math.random()-0.5)*0.02,size:8+Math.random()*12,type:Math.floor(Math.random()*3),color:['#ffb6c1','#ffc0cb','#ff69b4','#ff1493'][Math.floor(Math.random()*4)]});
    for(let i=0;i<50;i++)particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,s:1+Math.random()*2,a:Math.random()*0.4+0.2,phase:Math.random()*Math.PI*2});
    for(let i=0;i<6;i++)glows.push({x:Math.random()*W,y:Math.random()*H,r:50+Math.random()*100,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,phase:Math.random()*Math.PI*2});
    function up(dt,t){cat.breathPhase=Math.sin(t*0.002)*0.03;cat.blinkTimer-=dt;if(cat.blinkTimer<=0){cat.isBlinking=true;cat.blinkTimer=3000+Math.random()*4000;}if(cat.isBlinking&&cat.blinkTimer<150)cat.isBlinking=false;if(Math.random()<0.002)cat.earTwitch=1;cat.earTwitch*=0.95;const tt=Math.sin(t*0.004)*0.4+(cat.cx-cat.x)*0.0003;cat.tailVel+=(tt-cat.tailAngle)*0.1;cat.tailVel*=0.85;cat.tailAngle+=cat.tailVel;cat.headAngle+=((cat.cx-cat.x)*0.0005-cat.headAngle)*0.1;if(st.pose==='wave')cat.pawWave=Math.sin(t*0.008)*0.6;else cat.pawWave*=0.92;if(st.pose==='jump'){cat.jumpVel-=0.6;cat.jumpY+=cat.jumpVel;if(cat.jumpY<=0){cat.jumpY=0;cat.jumpVel=0;st.pose='idle';}}if(st.pose==='roll'){cat.rollAngle+=0.12;if(cat.rollAngle>=Math.PI*2){cat.rollAngle=0;st.pose='idle';}}}
    function dc(t){x.save();x.translate(cat.x,cat.y+cat.jumpY);x.rotate(cat.rollAngle);x.scale(1+cat.breathPhase,1+cat.breathPhase);const s=Math.min(W,H)/600;x.fillStyle='rgba(0,0,0,0.2)';x.beginPath();x.ellipse(0,70*s,55*s,12*s,0,0,Math.PI*2);x.fill();x.strokeStyle=cat.bodyColor;x.lineWidth=12*s;x.beginPath();x.moveTo(50*s,30*s);x.quadraticCurveTo(100*s+Math.sin(t*0.004)*20*s,20*s,120*s+Math.sin(t*0.003)*30*s,-20*s+cat.tailAngle*50*s);x.stroke();x.fillStyle=cat.bodyColor;x.beginPath();x.ellipse(0,30*s,55*s,45*s,0,0,Math.PI*2);x.fill();x.fillStyle=cat.accentColor;x.globalAlpha=0.4;x.beginPath();x.ellipse(0,35*s,35*s,25*s,0,0,Math.PI);x.fill();x.globalAlpha=1;x.fillStyle=cat.bodyColor;if(st.pose==='walk'){const lo=Math.sin(t*0.015)*10;x.beginPath();x.ellipse(-30*s,65*s+lo,12*s,20*s,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(30*s,65*s-lo,12*s,20*s,0,0,Math.PI*2);x.fill();}else{x.beginPath();x.ellipse(-35*s,65*s,10*s,18*s,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(35*s,65*s,10*s,18*s,0,0,Math.PI*2);x.fill();}if(st.pose==='wave'){x.beginPath();x.ellipse(40*s,20*s+cat.pawWave*30*s,12*s,10*s,0.3,0,Math.PI*2);x.fill();}x.save();x.translate(0,-20*s);x.rotate(cat.headAngle);x.fillStyle=cat.bodyColor;x.beginPath();x.arc(0,0,40*s,0,Math.PI*2);x.fill();const et=cat.earTwitch;x.fillStyle=cat.bodyColor;x.beginPath();x.moveTo(-30*s,-25*s);x.lineTo(-25*s-et*5*s,-60*s);x.lineTo(-5*s,-30*s);x.fill();x.beginPath();x.moveTo(30*s,-25*s);x.lineTo(25*s+et*5*s,-60*s);x.lineTo(5*s,-30*s);x.fill();x.fillStyle='#ffb6c1';x.beginPath();x.moveTo(-25*s,-28*s);x.lineTo(-22*s-et*3*s,-48*s);x.lineTo(-10*s,-30*s);x.fill();x.beginPath();x.moveTo(25*s,-28*s);x.lineTo(22*s+et*3*s,-48*s);x.lineTo(10*s,-30*s);x.fill();const ey=-5*s;x.fillStyle='#333';if(!cat.isBlinking){x.beginPath();x.ellipse(-15*s,ey,8*s,10*s,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(15*s,ey,8*s,10*s,0,0,Math.PI*2);x.fill();x.fillStyle='#fff';x.beginPath();x.arc(-17*s,ey-3*s,3*s,0,Math.PI*2);x.fill();x.beginPath();x.arc(13*s,ey-3*s,3*s,0,Math.PI*2);x.fill();}else{x.lineWidth=3*s;x.beginPath();x.moveTo(-23*s,ey);x.lineTo(-7*s,ey);x.stroke();x.beginPath();x.moveTo(7*s,ey);x.lineTo(23*s,ey);x.stroke();}x.fillStyle='#ff69b4';x.beginPath();x.moveTo(0,10*s);x.lineTo(-6*s,18*s);x.lineTo(6*s,18*s);x.fill();x.strokeStyle='#333';x.lineWidth=2*s;x.beginPath();x.moveTo(0,18*s);x.lineTo(0,25*s);x.stroke();x.beginPath();x.moveTo(0,25*s);x.quadraticCurveTo(-10*s,32*s,-15*s,25*s);x.stroke();x.beginPath();x.moveTo(0,25*s);x.quadraticCurveTo(10*s,32*s,15*s,25*s);x.stroke();x.strokeStyle='#888';x.lineWidth=1*s;for(let i=0;i<3;i++){x.beginPath();x.moveTo(-20*s,15*s+i*5*s);x.lineTo(-45*s,10*s+i*6*s);x.stroke();x.beginPath();x.moveTo(20*s,15*s+i*5*s);x.lineTo(45*s,10*s+i*6*s);x.stroke();}x.restore();x.restore();}
    function db(t){
        // Romantic deep rose gradient
        const g=x.createLinearGradient(0,0,0,H);
        g.addColorStop(0,'#3d1b3e');g.addColorStop(0.3,'#2d1b2e');g.addColorStop(0.6,'#1a0a15');g.addColorStop(0.85,'#0f0509');g.addColorStop(1,'#050204');
        x.fillStyle=g;x.fillRect(0,0,W,H);
        // Pulsing romantic glows
        for(let gl of glows){gl.x+=gl.vx;gl.y+=gl.vy;if(gl.x<-gl.r)gl.x=W+gl.r;if(gl.x>W+gl.r)gl.x=-gl.r;if(gl.y<-gl.r)gl.y=H+gl.r;if(gl.y>H+gl.r)gl.y=-gl.r;const pulse=0.3+Math.sin(t*0.002+gl.phase)*0.2;const gg=x.createRadialGradient(gl.x,gl.y,0,gl.x,gl.y,gl.r);gg.addColorStop(0,`rgba(255,105,180,${pulse})`);gg.addColorStop(0.5,`rgba(255,20,147,${pulse*0.5})`);gg.addColorStop(1,'transparent');x.fillStyle=gg;x.globalAlpha=pulse;x.beginPath();x.arc(gl.x,gl.y,gl.r,0,Math.PI*2);x.fill();}
        // Falling rose petals with rotation
        x.globalAlpha=0.7;
        for(let p of petals){p.y+=p.vy;p.x+=p.vx+Math.sin(t*0.001+p.y*0.01)*0.5;p.rot+=p.vr;if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}x.save();x.translate(p.x,p.y);x.rotate(p.rot+p.y*0.01);x.fillStyle=p.color;const w=p.size,h=p.size*0.6;x.beginPath();x.ellipse(0,0,w,h,0,0,Math.PI*2);x.fill();x.strokeStyle='rgba(255,255,255,0.3)';x.lineWidth=0.5;x.beginPath();x.moveTo(0,-h*0.8);x.lineTo(0,h*0.8);x.stroke();x.restore();}
        // Sparkling particles
        x.globalAlpha=1;
        for(let p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;const twinkle=Math.sin(t*0.008+p.phase);if(twinkle>0.5){x.fillStyle=`rgba(255,200,220,${p.a*(0.5+twinkle*0.5)})`;x.beginPath();x.arc(p.x,p.y,p.s,0,Math.PI*2);x.fill();}}
        // Decorative flowers at bottom
        const fc=['#ff69b4','#ff1493','#db7093','#c71585'];
        for(let i=0;i<15;i++){const fx=(i*W/12+30)%W,fy=H-40-(i*53%80),fs=6+(i%6);x.fillStyle=fc[i%4];for(let po=0;po<5;po++){const a=(po/5)*Math.PI*2+t*0.0005+i;x.beginPath();x.ellipse(fx+Math.cos(a)*fs*0.8,fy+Math.sin(a)*fs*0.8,fs*0.5,fs*0.25,a,0,Math.PI*2);x.fill();}x.fillStyle='#fffacd';x.beginPath();x.arc(fx,fy,fs*0.25,0,Math.PI*2);x.fill();}
        // Soft light rays
        x.globalAlpha=0.08;
        for(let i=0;i<4;i++){const rx=W*0.2+i*W*0.25;const rg=x.createLinearGradient(rx,0,rx,H);rg.addColorStop(0,'rgba(255,200,220,0.6)');rg.addColorStop(1,'transparent');x.fillStyle=rg;x.beginPath();x.moveTo(rx-30,0);x.lineTo(rx+30,0);x.lineTo(rx+60+Math.sin(t*0.001+i)*20,H*0.7);x.lineTo(rx-60+Math.sin(t*0.001+i)*20,H*0.7);x.fill();}
        x.globalAlpha=1;
    }
    function anim(ts){const dt=Math.min(ts-lt,50);lt=ts;x.clearRect(0,0,W,H);db(ts);up(dt,ts);dc(ts);requestAnimationFrame(anim);}
    c.addEventListener('mousemove',e=>{cat.cx=e.clientX;});
    c.addEventListener('click',()=>{if(st.pose==='idle'){st.pose='jump';cat.jumpVel=15;}});
    window.addEventListener('keydown',e=>{if(e.key==='c'||e.key==='C'){st.pose=ps[(ps.indexOf(st.pose)+1)%ps.length];if(st.pose==='roll')cat.rollAngle=0;}});
    window.addEventListener('resize',rs);requestAnimationFrame(anim);
})();
</script>
</body>
</html>
